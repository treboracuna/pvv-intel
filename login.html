<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PVV — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07090d; --surface: #0c0f15; --surface2: #11151d;
  --border: #1a2030; --accent: #d4f53c; --accent-dim: rgba(212,245,60,0.08);
  --green: #2ecc8a; --red: #ff4d4d; --red-dim: rgba(255,77,77,0.08);
  --text: #dde2ee; --muted: #4a5568;
}
body {
  background: var(--bg); color: var(--text);
  font-family: "Syne", sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
body::before {
  content: ""; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(212,245,60,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(212,245,60,0.025) 1px, transparent 1px);
  background-size: 44px 44px; pointer-events: none; z-index: 0;
}
.login-wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px; padding: 20px;
}
.login-logo {
  text-align: center; margin-bottom: 40px;
}
.login-logo-text {
  font-size: 20px; font-weight: 800; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--accent);
}
.login-logo-sub {
  font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
  text-transform: uppercase; margin-top: 6px;
  font-family: "IBM Plex Mono", monospace;
}
.login-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 36px;
}
.login-title {
  font-size: 18px; font-weight: 700; color: var(--text);
  margin-bottom: 6px;
}
.login-sub {
  font-size: 13px; color: var(--muted); margin-bottom: 28px; line-height: 1.5;
}
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 10px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 7px;
}
.field input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: "IBM Plex Mono", monospace; font-size: 14px;
  padding: 12px 16px; border-radius: 6px; outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; padding: 14px; background: var(--accent); color: #000;
  font-family: "Syne", sans-serif; font-size: 13px; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase; border: none;
  border-radius: 6px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px;
}
.login-btn:hover:not(:disabled) { background: #e8ff60; }
.login-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 13px; height: 13px; border: 2px solid rgba(0,0,0,0.3);
  border-top-color: #000; border-radius: 50%;
  animation: spin 0.6s linear infinite; display: inline-block;
}
.error-msg {
  background: var(--red-dim); border: 1px solid rgba(255,77,77,0.25);
  border-radius: 6px; padding: 12px 16px; color: var(--red);
  font-size: 13px; margin-bottom: 16px; font-family: "IBM Plex Mono", monospace;
  display: none;
}
.lock-icon {
  width: 48px; height: 48px; background: var(--accent-dim);
  border: 1px solid rgba(212,245,60,0.2); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; margin: 0 auto 20px;
}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="login-logo-text">PVV</div>
    <div class="login-logo-sub">Viral Growth Intelligence</div>
  </div>
  <div class="login-card">
    <div class="lock-icon">🔒</div>
    <div class="login-title">Restricted Access</div>
    <div class="login-sub">This system is private. Authorized users only.</div>
    <div class="error-msg" id="errMsg"></div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
      <span id="loginSpinner" class="spinner" style="display:none"></span>
      <span id="loginLbl">Access System</span>
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
async function initLogin() {
  const cfg = await fetch('/api/config').then(r => r.json());
  const { createClient } = supabase;
  const sb = createClient(cfg.supabase_url, cfg.supabase_key);
  window._sb = sb;

  sb.auth.onAuthStateChange((event, session) => { if (session) { const dest = new URLSearchParams(window.location.search).get('redirect') || '/'; window.location.href = dest; } }); const { data } = await sb.auth.getSession();
  if (data.session) {
    const dest = new URLSearchParams(window.location.search).get('redirect') || '/';
    window.location.href = dest;
    return;
  }

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  window._showErr = function(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = 'block';
  };

  window._setLoading = function(on) {
    document.getElementById('loginBtn').disabled = on;
    document.getElementById('loginSpinner').style.display = on ? 'inline-block' : 'none';
    document.getElementById('loginLbl').textContent = on ? 'Signing in...' : 'Access System';
  };

  window.doLogin = async function() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { window._showErr('Enter email and password.'); return; }
    window._setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { window._showErr('Invalid email or password.'); window._setLoading(false); return; }
    const dest = new URLSearchParams(window.location.search).get('redirect') || '/';
    window.location.href = dest;
  };
}
initLogin();
</script>
</body>
</html>
